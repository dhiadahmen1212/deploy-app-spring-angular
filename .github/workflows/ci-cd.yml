name: Workflow CI Pipeline tp dahmen

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
      - name: connection a Docker Hub
        uses: docker/login-action@v3
        with: 
          username: ${{ secrets. DOCKERHUB_USERNAME }}
          password: ${{ secrets. DOCKERHUB_TOKEN }}
      - name: Builder l’image Docker du backend (local)
        run: |
          docker build -t nouran10/springboot-app ./springboot/app


      - name: Builder l’image Docker du frontend (local)
        run: |
          docker build -t nouran10/angular-app ./angular-app


      - name: Lancer docker compose
        run: |
          docker compose up -d
          docker ps
